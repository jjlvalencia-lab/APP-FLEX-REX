name: Build Android APK with Buildozer

on:
  push:
    branches:
      - master
      - maestro
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Java 17 Development Kit
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libffi-dev libgdbm-dev libsqlite3-dev libbz2-dev liblzma-dev tk-dev libdb-dev readline-common

    - name: Install Buildozer and Cython
      run: |
        pip install --user --upgrade buildozer cython virtualenv

    - name: Compile APK via Buildozer
      run: |
        cd Contadores-master
        
        # Sincronizar de forma estricta las herramientas nativas preinstaladas
        export JAVA_HOME=$JAVA_HOME_17_X64
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        
        # Agregar el sdkmanager moderno del sistema al PATH para que Buildozer lo encuentre sí o sí
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$JAVA_HOME/bin:$PATH
        
        # Limpiar referencias antiguas del NDK para evitar conflictos de API
        unset ANDROID_NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        
        ~/.local/bin/buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FlexRex-APK
        path: Contadores-master/.buildozer/android/platform/build-arm64-v8a/dists/flexrex/build/outputs/apk/debug/*.apk
