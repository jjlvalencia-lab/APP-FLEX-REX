name: Compilar APK con Buildozer

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del sistema de Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libffi-dev libgdbm-dev libsqlite3-dev libbz2-dev liblzma-dev tk-dev libdb-dev readline-common

    - name: Instalar Buildozer y Cython
      run: |
        pip install --user --upgrade buildozer cython virtualenv

    - name: Compilar APK con Buildozer
      run: |
        cd Contadores-master
        
        # Crear estructura de configuración limpia y aceptar términos
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        if [ ! -f buildozer.spec ]; then
          ~/.local/bin/buildozer init
        fi
        
        # Forzar la configuración interna del archivo .spec para que sea compatible
        sed -i 's/title = My Application/title = Flex Rex/g' buildozer.spec
        # Simplificamos requerimientos iniciales para asegurar el núcleo estable de la interfaz
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.1,kivymd==1.2.0,opencv-python/g' buildozer.spec
        sed -i 's/#android.permissions = CAMERA/android.permissions = CAMERA/g' buildozer.spec
        
        # Cambiar arquitectura a la estándar moderna de 64 bits para evitar conflictos antiguos
        sed -i 's/android.archs = armeabi-v7a/android.archs = arm64-v8a/g' buildozer.spec
        
        # Forzar la aceptación automática de licencias de Android SDK
        sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        
        # Ejecutar compilación limpia sin usar el comando destructivo 'yes'
        ~/.local/bin/buildozer android debug
