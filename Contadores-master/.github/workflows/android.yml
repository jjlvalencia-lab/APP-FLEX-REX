name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip python3-setuptools python3-wheel python3-jinja2 build-essential autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good libmtdev-dev libgl1-mesa-dev libgles2-mesa-dev libsqlite3-dev libffi-dev libssl-dev libjpeg-dev libfreetype6-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython==0.29.37 buildozer==1.6.0

      - name: Build APK
        run: |
          cd ${{ github.workspace }}
          python -m buildozer android debug

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flexrex-apk
          path: bin/*.apk
